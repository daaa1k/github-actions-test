name: Lint GitHub Actions workflows

on:
  push:
    paths:
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ACTIONLINT_VERSION: v1.7.12
      GHALINT_VERSION: v1.5.5
      ZIZMOR_VERSION: v1.23.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install tools (curl + checksum verify) and run linters
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/gha-linters"
          mkdir -p "${bin_dir}"
          cd "${bin_dir}"

          al_ver="${ACTIONLINT_VERSION#v}"
          curl -sSLO "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${al_ver}_checksums.txt"
          curl -sSLO "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${al_ver}_linux_amd64.tar.gz"
          grep -E "actionlint_${al_ver}_linux_amd64\\.tar\\.gz\$" "actionlint_${al_ver}_checksums.txt" | sha256sum -c -
          tar -xzf "actionlint_${al_ver}_linux_amd64.tar.gz" actionlint

          gh_ver="${GHALINT_VERSION#v}"
          curl -sSLO "https://github.com/suzuki-shunsuke/ghalint/releases/download/${GHALINT_VERSION}/ghalint_${gh_ver}_checksums.txt"
          curl -sSLO "https://github.com/suzuki-shunsuke/ghalint/releases/download/${GHALINT_VERSION}/ghalint_${gh_ver}_linux_amd64.tar.gz"
          grep -E "ghalint_${gh_ver}_linux_amd64\\.tar\\.gz\$" "ghalint_${gh_ver}_checksums.txt" | sha256sum -c -
          tar -xzf "ghalint_${gh_ver}_linux_amd64.tar.gz" ghalint

          zizmor_asset="zizmor-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSLO "https://github.com/zizmorcore/zizmor/releases/download/${ZIZMOR_VERSION}/${zizmor_asset}"
          digest="$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/zizmorcore/zizmor/releases/tags/${ZIZMOR_VERSION}" \
            | jq -r --arg name "${zizmor_asset}" '.assets[] | select(.name == $name) | .digest')"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "Could not resolve digest for ${zizmor_asset} at ${ZIZMOR_VERSION}" >&2
            exit 1
          fi
          digest_hex="${digest#sha256:}"
          echo "${digest_hex}  ${zizmor_asset}" | sha256sum -c -
          tar -xzf "${zizmor_asset}"
          chmod +x zizmor

          export PATH="${bin_dir}:${PATH}"
          cd "${GITHUB_WORKSPACE}"

          actionlint
          ghalint run
          zizmor --offline .github/workflows
