name: Lint GitHub Actions workflows

on:
  push:
    paths:
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: lint-actions-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    env:
      ACTIONLINT_COMMIT: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
      GHALINT_COMMIT: 99b0e63be7fbd4c30c6d0b3da5b4a94a19ad55e6 # v1.5.5
      ZIZMOR_COMMIT: 0b77258cf93d4e0ae762c843422c333faf2793f6 # v1.23.1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install linters
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/gha-linters"
          mkdir -p "${bin_dir}"
          cd "${bin_dir}"

          resolve_tag() {
            local owner="$1" repo="$2" want="$3"
            want="$(printf '%s' "$want" | tr '[:upper:]' '[:lower:]')"
            local page=1
            while [ "$page" -le 100 ]; do
              local json
              json=$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/${owner}/${repo}/tags?per_page=100&page=${page}")
              local count
              count=$(echo "$json" | jq 'length')
              [ "$count" -eq 0 ] && break
              local tag
              tag=$(echo "$json" | jq -r --arg sha "$want" \
                '.[] | select((.commit.sha | ascii_downcase) == $sha) | .name' | head -1)
              if [ -n "$tag" ] && [ "$tag" != "null" ]; then
                printf '%s' "$tag"
                return 0
              fi
              page=$((page + 1))
            done
            echo "No tag found for commit ${want} in ${owner}/${repo}" >&2
            return 1
          }

          install_checksums_tarball() {
            local owner="$1" repo="$2" commit="$3" bin_name="$4"
            local tag ver checksums tarball base
            tag="$(resolve_tag "$owner" "$repo" "$commit")"
            ver="${tag#v}"
            checksums="${bin_name}_${ver}_checksums.txt"
            tarball="${bin_name}_${ver}_linux_amd64.tar.gz"
            base="https://github.com/${owner}/${repo}/releases/download/${tag}"
            curl -sSLO "${base}/${checksums}"
            curl -sSLO "${base}/${tarball}"
            grep -E "${tarball}\$" "$checksums" | sha256sum -c -
            tar -xzf "$tarball" "$bin_name"
          }

          install_zizmor() {
            local owner="zizmorcore" repo="zizmor" asset="zizmor-x86_64-unknown-linux-gnu.tar.gz"
            local tag digest digest_hex
            tag="$(resolve_tag "$owner" "$repo" "$1")"
            curl -sSLO "https://github.com/${owner}/${repo}/releases/download/${tag}/${asset}"
            digest=$(curl -sS -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}" \
              | jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest')
            if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
              echo "Could not resolve digest for ${asset} at ${tag}" >&2
              exit 1
            fi
            digest_hex="${digest#sha256:}"
            echo "${digest_hex}  ${asset}" | sha256sum -c -
            tar -xzf "${asset}"
            chmod +x zizmor
          }

          install_checksums_tarball rhysd actionlint "${ACTIONLINT_COMMIT}" actionlint
          install_checksums_tarball suzuki-shunsuke ghalint "${GHALINT_COMMIT}" ghalint
          install_zizmor "${ZIZMOR_COMMIT}"

          echo "${bin_dir}" >> "${GITHUB_PATH}"

      - name: Run linters
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          actionlint
          ghalint run
          zizmor .
